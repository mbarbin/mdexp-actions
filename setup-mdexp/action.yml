name: "setup-mdexp"
description: "Download and set up the mdexp executable from a GitHub release."
author: "mdexp contributors"
inputs:
  mdexp-version:
    description: "mdexp version to install."
    required: true
  mdexp-digest:
    description: "Expected digest of the binary for integrity verification (e.g., sha256:abc123...). The action will fail if the downloaded binary does not match."
    required: true
runs:
  using: "composite"
  steps:
    - name: Install mdexp
      shell: sh
      run: |
        "${{ github.action_path }}/install.sh"
      env:
        MDEXP_VERSION: ${{ inputs.mdexp-version }}
        MDEXP_DIGEST: ${{ inputs.mdexp-digest }}
        GH_TOKEN: ${{ github.token }}
branding:
  icon: "book-open"
  color: "purple"
